spring.datasource.url=jdbc:mysql://localhost:3306/movie_booking?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=movieapp
spring.datasource.password=movieapp123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.port=8090

# Seat hold expiry in seconds
booking.hold.duration-seconds=300
# Scheduler interval (ms) for releasing expired holds
booking.hold.release-interval-ms=30000

# Async executor
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8

logging.level.org.hibernate.SQL=WARN
logging.level.com.booking=INFO
